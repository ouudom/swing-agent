name: swing-agent

services:
  postgres:
    image: postgres:16-alpine
    container_name: swing-agent-postgres
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-swing_agent}
      POSTGRES_USER: ${POSTGRES_USER:-swing_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swing_agent_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./src/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

  redis:
    image: redis:7-alpine
    container_name: swing-agent-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swing-agent-worker
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      SWING_AGENT_REPO_ROOT: /app
      PIPELINE_RUN_LOG: /app/src/logs/pipeline_run.jsonl
      SWING_DB_BACKEND: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-swing_agent}
      POSTGRES_USER: ${POSTGRES_USER:-swing_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swing_agent_dev_password}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /app/src
    # concurrency >= 2: market_cycle/nightly_replay block on a group().get() for
    # their fan-out legs (see celery_tasks.py) — a parent waiting on its own
    # children with concurrency=1 deadlocks the pool.
    command: ["celery", "-A", "pipeline.celery_app", "worker", "--loglevel=INFO", "--concurrency=4"]
    healthcheck:
      test: ["CMD-SHELL", "celery -A pipeline.celery_app inspect ping --timeout=5"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 20s
    volumes:
      - .:/app

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swing-agent-beat
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      SWING_AGENT_REPO_ROOT: /app
      SWING_DB_BACKEND: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-swing_agent}
      POSTGRES_USER: ${POSTGRES_USER:-swing_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swing_agent_dev_password}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    working_dir: /app/src
    command: ["celery", "-A", "pipeline.celery_app", "beat", "--loglevel=INFO"]
    volumes:
      - .:/app

  mcp-native:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swing-agent-mcp-native
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      SWING_AGENT_REPO_ROOT: /app
      MCP_HOST: 0.0.0.0
      MCP_NATIVE_PORT: 8766
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-dev-token}
      SWING_DB_BACKEND: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-swing_agent}
      POSTGRES_USER: ${POSTGRES_USER:-swing_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swing_agent_dev_password}
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    command: ["python", "src/mcp_server/server_mcp.py"]
    ports:
      - "127.0.0.1:${MCP_NATIVE_PORT:-8766}:8766"
    volumes:
      - .:/app

  dashboard:
    build:
      context: ./src/dashboard
      dockerfile: Dockerfile
    container_name: swing-agent-dashboard
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PORT: 8888
      SWING_DB_BACKEND: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-swing_agent}
      POSTGRES_USER: ${POSTGRES_USER:-swing_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swing_agent_dev_password}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${DASHBOARD_PORT:-8888}:8888"
    # No bind mount: self-contained image (built Vite bundle + API), so `.:/app`
    # doesn't shadow the baked-in dist. Rebuild the image to ship UI changes.

volumes:
  postgres_data:
  redis_data:
