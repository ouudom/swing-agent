name: swing-agent

services:
  postgres:
    image: postgres:16-alpine
    container_name: swing-agent-postgres
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-swing_agent}
      POSTGRES_USER: ${POSTGRES_USER:-swing_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swing_agent_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
      - ./src/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swing-agent-pipeline
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      SWING_AGENT_REPO_ROOT: /app
      PIPELINE_RUN_LOG: /app/src/logs/pipeline_run.jsonl
      SWING_DB_BACKEND: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-swing_agent}
      POSTGRES_USER: ${POSTGRES_USER:-swing_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swing_agent_dev_password}
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    command: ["python", "src/pipeline/scheduler.py"]
    volumes:
      - .:/app

  mcp-native:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swing-agent-mcp-native
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      SWING_AGENT_REPO_ROOT: /app
      MCP_HOST: 0.0.0.0
      MCP_NATIVE_PORT: 8766
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:-dev-token}
      SWING_DB_BACKEND: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-swing_agent}
      POSTGRES_USER: ${POSTGRES_USER:-swing_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swing_agent_dev_password}
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    command: ["python", "src/mcp-server/server_mcp.py"]
    ports:
      - "127.0.0.1:${MCP_NATIVE_PORT:-8766}:8766"
    volumes:
      - .:/app

  dashboard:
    build:
      context: ./src/dashboard
      dockerfile: Dockerfile
    container_name: swing-agent-dashboard
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PORT: 8888
      SWING_DB_BACKEND: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-swing_agent}
      POSTGRES_USER: ${POSTGRES_USER:-swing_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swing_agent_dev_password}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${DASHBOARD_PORT:-8888}:8888"
    # No bind mount: self-contained image (built Vite bundle + API), so `.:/app`
    # doesn't shadow the baked-in dist. Rebuild the image to ship UI changes.

volumes:
  postgres_data:
